<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Practice | Coding Learning Hub</title>
    <link rel="stylesheet" href="../shared/styles.css" />
    <style>
      .tab-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
      }

      .tab-button {
        flex: 0 0 auto;
        padding: 10px 16px;
        white-space: nowrap;
        color: var(--text);
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
      }

      .tab-button[aria-selected="true"] {
        color: white;
        background: var(--accent);
        border-color: var(--accent);
      }

      .tab-panel[hidden] {
        display: none !important;
      }

      .field-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }

      .field-row label {
        color: var(--muted);
      }

      input.field {
        width: 80px;
        padding: 9px 12px;
        color: var(--text);
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 10px;
        font: inherit;
      }

      input.field:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      .confirmation {
        margin-top: 14px;
        padding: 12px 14px;
        color: var(--accent-dark);
        background: var(--sage-soft);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="top-row">
          <div>
            <span class="pill">Practice</span>
            <h1>Skill Practice</h1>
            <p class="muted">One small lesson. One useful skill. No pressure.</p>
          </div>
          <a href="index.html">Back to Practice</a>
        </div>
      </section>

      <section class="card">
        <div class="tab-list" role="tablist" aria-label="Language" id="tab-list"></div>
      </section>

      <div id="tab-panels"></div>
    </main>

    <script src="skill-practice-data.js" defer></script>
    <script src="skill-practice.js" defer></script>
  </body>
</html>
