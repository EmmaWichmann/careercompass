<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logs | Coding Learning Hub</title>
    <link rel="stylesheet" href="../shared/styles.css" />
    <script src="../shared/storage.js" defer></script>
    <script src="logs.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="top-row">
          <div>
            <span class="pill">Saved in this browser</span>
            <h1>Logs</h1>
            <p class="muted">
              Exam attempts appear here automatically. You can also back up or
              restore all Coding Learning Hub progress.
            </p>
          </div>
          <a href="../index.html">Back to Home</a>
        </div>
        <div class="button-row">
          <button class="button primary" id="export-data" type="button">Export Progress</button>
          <label class="button secondary" for="import-data">Import Progress</label>
          <input id="import-data" type="file" accept="application/json" hidden />
        </div>
        <p class="muted" id="import-status"></p>
      </section>

      <section class="card">
        <div class="stats-row">
          <div class="stat">
            <strong id="attempt-count">0</strong>
            <span>exam attempts</span>
          </div>
          <div class="stat">
            <strong id="passed-count">0</strong>
            <span>exams passed</span>
          </div>
          <div class="stat">
            <strong id="card-count">0</strong>
            <span>missed cards</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Automatic Activity</h2>
        <div class="log-feed" id="log-feed"></div>
      </section>

      <section class="card">
        <h2>Written Records</h2>
        <p><a href="practice-log.md">Practice Log</a></p>
        <p><a href="coding-profile-and-practice-record.md">Coding Profile and Practice Record</a></p>
      </section>
    </main>
  </body>
</html>
