<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exams | Coding Learning Hub</title>
    <link rel="stylesheet" href="../shared/styles.css" />
    <script src="../shared/storage.js" defer></script>
    <script src="../data/exam-data.js" defer></script>
    <script src="track.js" defer></script>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="top-row">
          <div>
            <span class="pill">Beginner tracks</span>
            <h1>Exams</h1>
            <p class="muted">
              Complete ten small exams for each language. Every exam has twenty
              questions and saves your best result in this browser.
            </p>
          </div>
          <a href="../index.html">Back to Home</a>
        </div>
      </section>

      <section class="card">
        <div class="pill-row" role="tablist" aria-label="Choose a language">
          <button class="button primary" data-language="html" type="button">HTML</button>
          <button class="button" data-language="javascript" type="button">JavaScript</button>
        </div>
      </section>

      <section class="card">
        <div class="top-row">
          <div>
            <h2 id="track-title">HTML Beginner Track</h2>
            <p class="muted" id="track-summary"></p>
          </div>
          <strong id="passed-label">Exams passed: 0 of 10</strong>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="track-progress"></div>
        </div>
      </section>

      <section class="exam-grid" id="exam-grid"></section>
    </main>
  </body>
</html>
