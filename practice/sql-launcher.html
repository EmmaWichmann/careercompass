<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Flow | Career Compass</title>
    <style>
      :root{--bg:#f7f2eb;--panel:#fffaf4;--text:#37261c;--muted:#6d584c;--accent:#b75e3c;--accent-soft:#ead7c8;--line:#dbc8b8;--shadow:0 18px 45px rgba(76,47,28,.08);--radius:20px}
      *{box-sizing:border-box}
      body{margin:0;font-family:Georgia,"Times New Roman",serif;background:linear-gradient(180deg,#fbf7f1 0%,var(--bg) 100%);color:var(--text)}
      main{width:min(980px,calc(100% - 32px));margin:0 auto;padding:32px 0 56px}
      .hero,.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
      h1,h2,p{margin-top:0}
      h1{color:var(--accent);font-size:clamp(2.2rem,6vw,4rem);margin-bottom:10px}
      .eyebrow,.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:.9rem}
      .muted{color:var(--muted);line-height:1.7}
      .flow{display:grid;gap:12px}
      .stage{padding:16px;border:1px solid var(--line);border-radius:14px;background:#fffdf9;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
      .stage strong{display:block;margin-bottom:4px}
      .buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
      .button{display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border-radius:999px;border:1px solid var(--accent);text-decoration:none}
      .button.primary{background:#8f4528;border-color:#8f4528;color:white}
      .button.secondary{background:transparent;color:var(--accent)}
      .note-box{padding:14px 16px;border-left:4px solid var(--accent);background:#fff7ef;border-radius:12px;margin-top:12px}
      @media (max-width:760px){.stage{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">SQL lesson → quiz → applied challenge</span>
        <h1>SQL Flow</h1>
        <p class="muted">A compact launcher for the current SQL phase. Start with SQLBolt, then take the matching concept check, then move into a realistic applied challenge if the concept feels steady.</p>
      </section>

      <section class="card">
        <h2>Recommended Flow</h2>
        <div class="flow" id="flow-list"></div>
      </section>
    </main>

    <script>
      (function () {
        const mastery = read("coding-hub-concept-mastery", {});
        const steps = [
          { title: "Step 1: SQLBolt lesson", note: "Short explanation first, then hands-on practice.", href: getLesson().resource, label: "Open SQLBolt" },
          { title: "Step 2: Concept check", note: "A focused quiz to check understanding before moving on.", href: getLesson().assessment, label: "Start Quiz" },
          { title: "Step 3: Applied challenge", note: "Try a realistic filtering or reporting scenario after the quiz.", href: "../exams/", label: "Open Applied Challenge" }
        ];

        const list = document.getElementById("flow-list");
        steps.forEach(function (step, index) {
          const row = document.createElement("div");
          row.className = "stage";
          row.innerHTML =
            '<div><strong>' + step.title + '</strong><p class="muted">' + step.note + '</p></div>' +
            '<a class="button ' + (index === 0 ? "primary" : "secondary") + '" href="' + step.href + '">' + step.label + '</a>';
          list.append(row);
        });

        function getLesson() {
          const progression = [
            { key: "sql::SELECT", title: "SQL Lesson 1: SELECT queries 101", resource: "https://sqlbolt.com/lesson/select_queries_introduction", assessment: "../exams/exam.html?language=sql&exam=1" },
            { key: "sql::WHERE", title: "SQL Lesson 2: Queries with constraints (Pt. 1)", resource: "https://sqlbolt.com/lesson/select_queries_with_constraints", assessment: "../exams/exam.html?language=sql&exam=2" },
            { key: "sql::ORDER BY", title: "SQL Lesson 4: Filtering and sorting Query results", resource: "https://sqlbolt.com/lesson/filtering_sorting_query_results", assessment: "../exams/exam.html?language=sql&exam=3" },
            { key: "sql::COUNT()", title: "SQL Lesson 10: Queries with aggregates (Pt. 1)", resource: "https://sqlbolt.com/lesson/select_queries_with_aggregates", assessment: "../exams/exam.html?language=sql&exam=4" },
            { key: "sql::GROUP BY", title: "SQL Lesson 11: Queries with aggregates (Pt. 2)", resource: "https://sqlbolt.com/lesson/select_queries_with_aggregates_pt_2", assessment: "../exams/exam.html?language=sql&exam=5" },
            { key: "sql::INNER JOIN", title: "SQL Lesson 6: Multi-table queries with JOINs", resource: "https://sqlbolt.com/lesson/select_queries_with_joins", assessment: "../exams/exam.html?language=sql&exam=7" },
            { key: "sql::LEFT JOIN", title: "SQL Lesson 7: OUTER JOINs", resource: "https://sqlbolt.com/lesson/select_queries_with_outer_joins", assessment: "../exams/exam.html?language=sql&exam=8" },
            { key: "sql::CASE WHEN", title: "SQL Lesson 9: Queries with expressions", resource: "https://sqlbolt.com/lesson/select_queries_with_expressions", assessment: "../exams/exam.html?language=sql&exam=9" },
            { key: "sql::subquery", title: "SQL Topic: Subqueries", resource: "https://sqlbolt.com/lesson/select_queries_with_subqueries", assessment: "../exams/exam.html?language=sql&exam=10" },
            { key: "sql::IS NULL", title: "SQL Lesson 8: A short note on NULLs", resource: "https://sqlbolt.com/lesson/select_queries_with_nulls", assessment: "../exams/exam.html?language=sql&exam=11" },
          ];

          return progression.find(function (item) {
            return (mastery[item.key]?.state || "NOT STARTED") !== "SOLID";
          }) || progression[0];
        }

        function read(key, fallback) {
          try {
            return JSON.parse(localStorage.getItem(key)) ?? fallback;
          } catch {
            return fallback;
          }
        }
      })();
    </script>
  </body>
</html>
